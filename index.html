<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer Vertical — Aguirre English Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  font-family: 'Outfit', sans-serif;
}

/* ===== FLYER STORIES (vertical) ===== */
.flyer {
  width: 100%;
  max-width: 540px;
  height: calc(100vh - 40px);
  max-height: 960px;
  aspect-ratio: 1080 / 1920;
  position: relative;
  overflow: hidden;
  background: #08090E;
  border-radius: 8px;
  box-shadow: 0 40px 120px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
}

/* Background elements */
.flyer-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 20%, rgba(196, 156, 42, 0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 75%, rgba(30, 80, 160, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(8,9,14,0) 0%, rgba(8,9,14,0.6) 100%);
}

/* Grid pattern overlay */
.flyer-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
}

/* Gold diagonal accent */
.flyer-diagonal {
  position: absolute;
  top: 0; right: 0;
  width: 280px; height: 280px;
  background: linear-gradient(135deg, transparent 40%, rgba(196,156,42,0.06) 100%);
}

/* Top bar */
.flyer-topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #C49C2A, #E8C96B, #C49C2A);
}

/* Content wrapper */
.flyer-content {
  position: relative;
  z-index: 10;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 40px 36px 36px;
}

/* HEADER */
.flyer-header {
  display: flex;
  align-items: center; /* Vertical alignment for logo-right badge */
  justify-content: space-between;
  margin-bottom: 24px;
}

.official-logo {
  max-height: 80px; /* Reduced logo size to integrate better */
  width: auto;
  object-fit: contain;
}

.header-right {
  text-align: right;
}
.online-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #C49C2A;
  border: 1px solid rgba(196,156,42,0.3);
  padding: 4px 10px;
  border-radius: 2px;
  background: rgba(196,156,42,0.06);
}
.online-badge::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #C49C2A;
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* HERO TEXT */
.flyer-hero {
  margin-bottom: 20px;
}

.flyer-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 8px;
}

.flyer-headline {
  font-family: 'Playfair Display', serif;
  font-size: 46px;
  font-weight: 900;
  line-height: 1.05;
  color: #F5F0E8;
  margin-bottom: 4px;
}
.flyer-headline .gold { color: #C49C2A; }
.flyer-headline .italic { font-style: italic; }

.flyer-subline {
  font-size: 13px;
  color: rgba(245,240,232,0.5);
  font-weight: 300;
  line-height: 1.5;
  margin-top: 10px;
}

/* DIVIDER */
.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(196,156,42,0.3), transparent);
  margin: 16px 0;
}

/* NICHES */
.niches {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.niche-tag {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(245,240,232,0.65);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 4px 10px;
  border-radius: 2px;
}
.niche-tag .icon { font-size: 11px; }

/* PRICING SECTION */
.pricing-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  margin-bottom: 10px;
}

.plans {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}

.plan {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}

.plan-inicio {
  background: linear-gradient(135deg, rgba(196,156,42,0.12), rgba(196,156,42,0.04));
  border-color: rgba(196,156,42,0.3);
}
.plan-inicio::before {
  content: 'OFERTA';
  position: absolute;
  top: 8px; right: -18px;
  background: #C49C2A;
  color: #08090E;
  font-family: 'DM Mono', monospace;
  font-size: 7.5px;
  font-weight: 500;
  letter-spacing: 1.5px;
  padding: 1px 24px;
  transform: rotate(45deg);
  transform-origin: center;
}

.plan-estandar { background: rgba(255,255,255,0.02); }
.plan-intensivo { background: rgba(30,80,160,0.06); border-color: rgba(30,80,160,0.2); }

.plan-name {
  font-size: 13px;
  font-weight: 600;
  color: #F5F0E8;
  margin-bottom: 2px;
}
.plan-detail {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  color: rgba(245,240,232,0.4);
  letter-spacing: 0.5px;
}
.plan-right { text-align: right; }
.plan-price {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: #F5F0E8;
  line-height: 1;
}
.plan-inicio .plan-price { color: #C49C2A; }
.plan-currency {
  font-family: 'DM Mono', monospace;
  font-size: 8.5px;
  color: rgba(245,240,232,0.3);
  letter-spacing: 1px;
}

/* FEATURE LIST */
.features {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}
.feature {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11.5px;
  color: rgba(245,240,232,0.55);
}
.feature::before {
  content: '✦';
  color: #C49C2A;
  font-size: 8px;
  flex-shrink: 0;
}

/* CTA */
.cta-block {
  margin-top: auto;
  background: linear-gradient(135deg, #C49C2A 0%, #E8C96B 50%, #C49C2A 100%);
  border-radius: 3px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}
.cta-block::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
}
.cta-left { position: relative; }
.cta-action {
  font-family: 'DM Mono', monospace;
  font-size: 8.5px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(8,9,14,0.6);
  margin-bottom: 2px;
}
.cta-contact {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  color: #08090E;
}
.cta-free {
  position: relative;
  text-align: right;
}
.cta-free-top {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(8,9,14,0.5);
}
.cta-free-bottom {
  font-size: 12px;
  font-weight: 700;
  color: #08090E;
}

/* FOOTER */
.flyer-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 14px;
}
.footer-handle {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.25);
}
.footer-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(196,156,42,0.4);
}

</style>
</head>

  <div class="flyer-bg"></div>
  <div class="flyer-grid"></div>
  <div class="flyer-diagonal"></div>
  <div class="flyer-topbar"></div>

  <div class="flyer-content">
